<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f5f5f5;
        }

        h2 {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .yes {
            color: green;
            font-weight: bold;
        }

        .no {
            color: red;
            font-weight: bold;
        }

        .unsure {
            color: orange;
            font-weight: bold;
        }

        .total {
            font-weight: bold;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h2>📊 Survey Analytics Dashboard</h2>

{% for r in results %}
<div class="card">

    <h3>{{ r.survey.question }}</h3>

    <div class="stats">
        <div class="yes">Yes: {{ r.yes }}</div>
        <div class="no">No: {{ r.no }}</div>
        <div class="unsure">Not sure: {{ r.unsure }}</div>
        <div class="total">Total: {{ r.total }}</div>
    </div>

    <p style="margin-top:10px;">
        <a href="/s/{{ r.survey.slug }}" target="_blank">Open Survey</a>
    </p>

</div>
{% endfor %}

</body>
</html>
